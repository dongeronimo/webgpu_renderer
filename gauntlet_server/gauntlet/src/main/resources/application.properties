spring.application.name=gauntlet

#H2 em arquivo (./data/gauntlet.mv.db, relativo ao diretorio de trabalho do
#processo) - persiste entre restarts, zero servico externo pra instalar/rodar.
#Se um dia isto virar Postgres/AWS, só troca url/driver/dialect aqui.
spring.datasource.url=jdbc:h2:file:./data/gauntlet
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
#o console web do H2 recusa conectar com senha em branco (campo obrigatório
#no form) - qualquer valor serve, é só o dev local abrindo o próprio arquivo.
spring.datasource.password=sa
#cria/atualiza o schema a partir das entities - sem migration tool por ora
#(banco pequeno, poucos devs; reavaliar se/quando isto crescer).
spring.jpa.hibernate.ddl-auto=update

#console web em /h2-console pra inspecionar as tabelas na mão - registrado
#manualmente em H2ConsoleConfig (o Boot 4 removeu o autoconfig que existia
#até o 3.x, essas properties sozinhas não bastam mais) e liberado do login
#em SecurityConfig.

#Atrás do Caddy na VM (etapa 1: WS/api/login vão DIRETO no api.dongeronimo.net,
#fora do CloudFront). O Caddy termina o TLS e faz proxy pro Spring na 8080,
#mandando X-Forwarded-Proto: https certinho (ao contrário do CloudFront, que
#nos deu toda a saga do CloudFront-Forwarded-Proto). Com 'framework' o
#ForwardedHeaderFilter honra esse header padrão → o Spring sabe que é https
#(cookie de sessão Secure, URLs absolutas https). Sem internal-proxies exótico:
#o Caddy conecta de localhost. Em dev (proxy do Vite, sem X-Forwarded-Proto) é
#inofensivo: sem o header, segue http://localhost.
server.forward-headers-strategy=framework
