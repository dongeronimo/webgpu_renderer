spring.application.name=gauntlet

#H2 em MEMORIA pros testes - nao disputa o arquivo ./data/gauntlet com um
#server rodando em paralelo (H2 em modo arquivo so aceita 1 JVM por vez) e
#some sozinho quando a JVM do teste termina.
spring.datasource.url=jdbc:h2:mem:gauntlet-test;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
spring.jpa.hibernate.ddl-auto=update
