<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU Volume Renderer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #ddd;
        font-family: monospace;
      }
      /* Container posicionado: canvas e overlay são filhos com inset:0,
         então ficam congruentes por construção — resize incluído, sem
         sincronizar tamanho na mão. */
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      /* O overlay cobre o canvas inteiro mas é transparente ao mouse
         (pointer-events:none); só os widgets interativos religam
         pointer-events:auto — clique no "vazio" atravessa até o canvas. */
      #ui-root {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #status {
        position: fixed;
        top: 8px;
        left: 8px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="gpu-canvas"></canvas>
      <div id="ui-root"></div>
    </div>
    <div id="status"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
